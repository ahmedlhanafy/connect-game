<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e; color: #ccc;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; margin: 0;
  }
  .card {
    text-align: center; padding: 40px;
    background: rgba(255,255,255,0.05); border-radius: 16px;
  }
  h2 { color: #fff; margin-bottom: 8px; }
  p { color: #888; font-size: 14px; }
</style>
</head>
<body>
<div class="card">
  <h2>Connect - Line Puzzle</h2>
  <p>Click Save to add the game to this tab.</p>
</div>
<script>
  microsoftTeams.app.initialize().then(() => {
    microsoftTeams.pages.config.registerOnSaveHandler((saveEvent) => {
      microsoftTeams.pages.config.setConfig({
        entityId: "connectGameTab",
        contentUrl: "https://ahmedlhanafy.github.io/connect-game/teams-app/index.html",
        websiteUrl: "https://ahmedlhanafy.github.io/connect-game/teams-app/index.html",
        suggestedDisplayName: "Connect"
      });
      saveEvent.notifySuccess();
    });
    microsoftTeams.pages.config.setValidityState(true);
  });
</script>
</body>
</html>
